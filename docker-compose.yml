services:
  db:
    image: mysql:8.0
    container_name: skillswap_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: skillswap
    ports:
      - "3307:3306"  # Changed from 3306:3306 to avoid conflicts
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: